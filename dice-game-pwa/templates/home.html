<section class="home-screen" aria-label="{{home.title}}">
  <h1>{{home.title}}</h1>
  <p>{{home.subtitle}}</p>

  <nav class="home-screen__modes" aria-label="{{home.selectMode}}">
    <div class="home-screen__mode-list" role="list" data-slot="mode-list"></div>
  </nav>

  <p class="home-screen__version" id="app-version"></p>
</section>
