<!DOCTYPE html>
<html lang="de" data-wcag="aa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0E11">
  <meta name="description" content="Dice Game PWA — Würfelspiele wie Kniffel, online und offline.">
  <title>Dice Game</title>

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">

  <!-- Import Map for bare module specifiers -->
  <script type="importmap">
  {
    "imports": {
      "motion": "https://cdn.jsdelivr.net/npm/motion@12/+esm",
      "three": "https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js"
    }
  }
  </script>

  <!-- Design System -->
  <link rel="stylesheet" href="css/foundation.css">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/dice.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>
  <a href="#main" class="skip-link">Zum Inhalt springen</a>

  <header role="banner">
    <h1>Dice Game</h1>
  </header>

  <main id="main" role="main">
    <!-- Screens werden hier dynamisch eingehängt -->
    <div id="app" aria-live="polite"></div>
  </main>

  <!-- ARIA Live Region für Würfelergebnisse -->
  <div id="dice-announcer" aria-live="assertive" aria-atomic="true" class="sr-only"></div>

  <!-- App Bootstrap -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
