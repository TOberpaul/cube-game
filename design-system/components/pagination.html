<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagination – Component Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="pagination.css" />
  <link rel="stylesheet" href="button.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <nav class="adaptive pagination" aria-label="Pagination">
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent" data-relation="smaller">‹</button>
    <button class="adaptive button" data-interactive data-material="transparent" data-relation="smaller">1</button>
    <button class="adaptive button" data-interactive data-material="semi-transparent" data-relation="smaller">2</button>
    <button class="adaptive button" data-interactive data-material="transparent" data-relation="smaller">3</button>
    <button class="adaptive button" data-interactive data-material="transparent" data-relation="smaller">4</button>
    <button class="adaptive button" data-interactive data-material="transparent" data-relation="smaller">5</button>
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent" data-relation="smaller">›</button>
  </nav>

</body>
</html>
