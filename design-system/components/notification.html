<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification – Component Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="notification.css" />
  <link rel="stylesheet" href="button.css" />
  <link rel="stylesheet" href="icon.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 40rem; }
    h2 { margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <h2 class="adaptive">Success</h2>
  <div class="adaptive notification" data-color="green" role="alert">
    <span class="notification__icon" data-content-contrast="min"><svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
    <div class="notification__content">
      <strong class="notification__title">Success</strong>
      <p class="notification__message">Operation completed successfully.</p>
    </div>
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent">✕</button>
  </div>

  <h2 class="adaptive">Error</h2>
  <div class="adaptive notification" data-color="red" role="alert">
    <span class="notification__icon" data-content-contrast="min"><svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
    <div class="notification__content">
      <strong class="notification__title">Error</strong>
      <p class="notification__message">Something went wrong. Please try again.</p>
    </div>
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent">✕</button>
  </div>

  <h2 class="adaptive">Warning</h2>
  <div class="adaptive notification" data-color="yellow" role="alert">
    <span class="notification__icon" data-content-contrast="min"><svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
    <div class="notification__content">
      <strong class="notification__title">Warning</strong>
      <p class="notification__message">Please review your input before continuing.</p>
    </div>
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent">✕</button>
  </div>

  <h2 class="adaptive">Info</h2>
  <div class="adaptive notification" data-color="blue" role="alert">
    <span class="notification__icon" data-content-contrast="min"><svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
    <div class="notification__content">
      <strong class="notification__title">Info</strong>
      <p class="notification__message">Here is some useful information.</p>
    </div>
    <button class="adaptive button button--icon-only" data-interactive data-material="transparent">✕</button>
  </div>

</body>
</html>
