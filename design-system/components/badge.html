<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge – Component Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="badge.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
    .demo-row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
    h2 { margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <h2 class="adaptive">Badge Variants</h2>
  <div class="demo-row">
    <span class="adaptive badge" data-material="origin" data-color="brand">3</span>
    <span class="adaptive badge" data-material="origin" data-color="action">12</span>
    <span class="adaptive badge" data-material="vibrant" data-color="red">New</span>
    <span class="adaptive badge" data-material="vibrant" data-color="green">Active</span>
    <span class="adaptive badge" data-material="vibrant" data-color="blue">Info</span>
  </div>

  <h2 class="adaptive">Sizes</h2>
  <div class="demo-row">
    <span class="adaptive badge" data-material="origin" data-color="brand" data-size="xs">1</span>
    <span class="adaptive badge" data-material="origin" data-color="brand" data-size="sm">2</span>
    <span class="adaptive badge" data-material="origin" data-color="brand">3</span>
    <span class="adaptive badge" data-material="origin" data-color="brand" data-size="lg">4</span>
  </div>

</body>
</html>
