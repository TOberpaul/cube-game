<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input – Component Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="input.css" />
  <link rel="stylesheet" href="select.css" />
  <link rel="stylesheet" href="textarea.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; max-width: 32rem; }
    h2 { margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <h2 class="adaptive">Text Input</h2>

  <label class="adaptive input">
    <span class="adaptive input__label" data-relation="smaller-3">Full Name</span>
    <input class="adaptive input__field" type="text" placeholder="Enter your name" data-material="filled-2" data-interactive />
  </label>

  <label class="adaptive input">
    <span class="adaptive input__label" data-relation="smaller-3">Email</span>
    <input class="adaptive input__field" type="email" placeholder="you@example.com" data-material="filled-2" data-interactive />
    <span class="adaptive input__hint" data-relation="smaller-3">We'll never share your email.</span>
  </label>

  <h2 class="adaptive">Select</h2>

  <label class="adaptive input">
    <span class="adaptive input__label" data-relation="smaller-3">Country</span>
    <select class="adaptive select" data-material="filled-2" data-interactive>
      <option>Germany</option>
      <option>Austria</option>
      <option>Switzerland</option>
    </select>
  </label>

  <h2 class="adaptive">Textarea</h2>

  <label class="adaptive input">
    <span class="adaptive input__label" data-relation="smaller-3">Message</span>
    <textarea class="adaptive textarea" data-material="filled-2" data-interactive placeholder="Write something..."></textarea>
  </label>

</body>
</html>
