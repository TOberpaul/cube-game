<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link – Component Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="link.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .demo-row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
    h2 { margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <h2 class="adaptive">Default Link</h2>
  <div class="demo-row">
    <a class="adaptive link" href="#">Default link</a>
    <a class="adaptive link" href="#" data-color="action">Action link</a>
    <a class="adaptive link" href="#" data-color="brand">Brand link</a>
  </div>

  <h2 class="adaptive">Link with Icon</h2>
  <div class="demo-row">
    <a class="adaptive link" href="#">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      Link with icon
    </a>
  </div>

</body>
</html>
