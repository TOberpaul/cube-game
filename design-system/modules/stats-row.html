<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Row – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/card.css" />
  <link rel="stylesheet" href="../components/headline.css" />
  <link rel="stylesheet" href="../components/badge.css" />
  <link rel="stylesheet" href="stats-row.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 2rem; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <div class="stats-row">
    <article class="adaptive card stats-row__item" data-material="filled">
      <div class="card__content">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <p class="adaptive text text--small" data-emphasis="weak">Total Users</p>
          <span class="adaptive badge" data-material="vibrant" data-color="green" data-relation="smaller">+12.5%</span>
        </div>
        <p class="adaptive headline" data-level="2">12,345</p>
      </div>
    </article>
    <article class="adaptive card stats-row__item" data-material="filled">
      <div class="card__content">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <p class="adaptive text text--small" data-emphasis="weak">Revenue</p>
          <span class="adaptive badge" data-material="vibrant" data-color="green" data-relation="smaller">+8.3%</span>
        </div>
        <p class="adaptive headline" data-level="2">€84,200</p>
      </div>
    </article>
    <article class="adaptive card stats-row__item" data-material="filled">
      <div class="card__content">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <p class="adaptive text text--small" data-emphasis="weak">Active Sessions</p>
          <span class="adaptive badge" data-material="vibrant" data-color="red" data-relation="smaller">-2.1%</span>
        </div>
        <p class="adaptive headline" data-level="2">1,892</p>
      </div>
    </article>
    <article class="adaptive card stats-row__item" data-material="filled">
      <div class="card__content">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <p class="adaptive text text--small" data-emphasis="weak">Conversion</p>
          <span class="adaptive badge" data-material="vibrant" data-color="green" data-relation="smaller">+0.5%</span>
        </div>
        <p class="adaptive headline" data-level="2">3.24%</p>
      </div>
    </article>
  </div>

</body>
</html>
