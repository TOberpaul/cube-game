<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/button.css" />
  <link rel="stylesheet" href="../components/link.css" />
  <link rel="stylesheet" href="header.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <header class="adaptive header" data-material="filled">
    <div class="header__inner">
      <a class="header__logo" href="/" aria-label="Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span class="header__brand">Brand</span>
      </a>
      <nav class="header__nav" aria-label="Main navigation">
        <a class="adaptive link header__nav-item" href="#">Features</a>
        <a class="adaptive link header__nav-item" href="#">Pricing</a>
        <a class="adaptive link header__nav-item" href="#">About</a>
        <a class="adaptive link header__nav-item" href="#">Contact</a>
      </nav>
      <div class="header__actions">
        <button class="adaptive button" data-interactive data-material="transparent">Login</button>
        <button class="adaptive button" data-interactive data-material="origin" data-color="action">Sign Up</button>
      </div>
      <button class="adaptive button button--icon-only header__menu-toggle" data-interactive data-material="transparent" aria-label="Menu">☰</button>
    </div>
  </header>

</body>
</html>
