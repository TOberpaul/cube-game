<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTA – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/button.css" />
  <link rel="stylesheet" href="../components/headline.css" />
  <link rel="stylesheet" href="cta.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <section class="adaptive cta" data-material="origin" data-color="action">
    <div class="cta__inner">
      <h2 class="adaptive headline" data-level="2">Ready to get started?</h2>
      <p class="adaptive text">Join thousands of users who are already building with our platform.</p>
      <div class="cta__actions">
        <button class="adaptive button" data-interactive data-material="origin" data-size="lg">Start Free Trial</button>
        <button class="adaptive button" data-interactive data-material="origin" data-size="lg">Contact Sales</button>
      </div>
    </div>
  </section>

</body>
</html>
