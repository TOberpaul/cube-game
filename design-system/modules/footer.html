<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footer – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/headline.css" />
  <link rel="stylesheet" href="../components/link.css" />
  <link rel="stylesheet" href="../components/divider.css" />
  <link rel="stylesheet" href="footer.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <footer class="adaptive footer" data-material="filled-2">
    <div class="footer__inner">
      <div class="footer__columns">
        <div class="footer__column">
          <h4 class="adaptive headline footer__heading" data-level="6">Company</h4>
          <nav class="footer__links">
            <a class="adaptive link" href="#">About</a>
            <a class="adaptive link" href="#">Careers</a>
            <a class="adaptive link" href="#">Press</a>
          </nav>
        </div>
        <div class="footer__column">
          <h4 class="adaptive headline footer__heading" data-level="6">Product</h4>
          <nav class="footer__links">
            <a class="adaptive link" href="#">Features</a>
            <a class="adaptive link" href="#">Pricing</a>
            <a class="adaptive link" href="#">Documentation</a>
          </nav>
        </div>
        <div class="footer__column">
          <h4 class="adaptive headline footer__heading" data-level="6">Support</h4>
          <nav class="footer__links">
            <a class="adaptive link" href="#">Help Center</a>
            <a class="adaptive link" href="#">Contact</a>
            <a class="adaptive link" href="#">Status</a>
          </nav>
        </div>
        <div class="footer__column">
          <h4 class="adaptive headline footer__heading" data-level="6">Legal</h4>
          <nav class="footer__links">
            <a class="adaptive link" href="#">Privacy</a>
            <a class="adaptive link" href="#">Terms</a>
            <a class="adaptive link" href="#">Imprint</a>
          </nav>
        </div>
      </div>
      <hr class="adaptive divider" />
      <div class="footer__bottom">
        <p class="adaptive text text--small">© 2026 Company. All rights reserved.</p>
      </div>
    </div>
  </footer>

</body>
</html>
