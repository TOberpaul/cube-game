<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/button.css" />
  <link rel="stylesheet" href="../components/headline.css" />
  <link rel="stylesheet" href="hero.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <section class="adaptive hero" data-material="origin" data-color="brand">
    <div class="hero__inner">
      <div class="hero__content">
        <h1 class="adaptive headline" data-level="1">Build something amazing</h1>
        <p class="adaptive text">A powerful platform that helps you create, manage, and scale your projects with ease.</p>
        <div class="hero__actions">
          <button class="adaptive button" data-interactive data-material="origin" data-size="lg">Get Started</button>
          <button class="adaptive button" data-interactive data-material="origin" data-size="lg">Learn More</button>
        </div>
      </div>
      <div class="hero__media">
        <img src="https://picsum.photos/seed/hero/800/600" alt="Hero visual" />
      </div>
    </div>
  </section>

</body>
</html>
