<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature Grid – Module Reference</title>
  <link rel="stylesheet" href="../foundation.css" />
  <link rel="stylesheet" href="../components/card.css" />
  <link rel="stylesheet" href="../components/headline.css" />
  <link rel="stylesheet" href="../components/icon.css" />
  <link rel="stylesheet" href="../components/section.css" />
  <link rel="stylesheet" href="feature-grid.css" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; }
  </style>
</head>
<body class="adaptive" data-color="neutral">

  <section class="adaptive section">
    <div class="section__inner">
      <h2 class="adaptive headline" data-level="2">Features</h2>
      <div class="feature-grid">
        <article class="adaptive card feature-grid__item" data-material="filled">
          <div class="card__content">
            <span class="adaptive icon-wrapper" data-color="action">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </span>
            <h3 class="adaptive headline" data-level="4">Lightning Fast</h3>
            <p class="adaptive text">Optimized for speed and performance from the ground up.</p>
          </div>
        </article>
        <article class="adaptive card feature-grid__item" data-material="filled">
          <div class="card__content">
            <span class="adaptive icon-wrapper" data-color="action">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </span>
            <h3 class="adaptive headline" data-level="4">Secure by Default</h3>
            <p class="adaptive text">Enterprise-grade security built into every layer.</p>
          </div>
        </article>
        <article class="adaptive card feature-grid__item" data-material="filled">
          <div class="card__content">
            <span class="adaptive icon-wrapper" data-color="action">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </span>
            <h3 class="adaptive headline" data-level="4">Easy Integration</h3>
            <p class="adaptive text">Connect with your existing tools in minutes.</p>
          </div>
        </article>
      </div>
    </div>
  </section>

</body>
</html>
